<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound Physics Playground</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e0d6c8;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
  }
  h1 {
    font-size: 1.6rem;
    color: #D4951A;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 30px;
  }

  /* Visualizer */
  .viz-wrap {
    width: 100%;
    max-width: 700px;
    height: 180px;
    background: #111;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
    position: relative;
  }
  #viz { width: 100%; height: 100%; }
  .viz-label {
    position: absolute;
    top: 10px;
    left: 14px;
    font-size: 0.65rem;
    color: #444;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Play button */
  .play-zone {
    margin-bottom: 30px;
    text-align: center;
  }
  #playBtn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid #D4951A;
    background: transparent;
    color: #D4951A;
    font-size: 2rem;
    cursor: pointer;
    transition: all 0.2s;
    outline: none;
  }
  #playBtn:hover { background: rgba(212,149,26,0.1); }
  #playBtn:active { transform: scale(0.95); background: rgba(212,149,26,0.2); }
  #playBtn.playing {
    background: #D4951A;
    color: #000;
    box-shadow: 0 0 30px rgba(212,149,26,0.4);
    animation: breathe 3s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { box-shadow: 0 0 20px rgba(212,149,26,0.3); }
    50% { box-shadow: 0 0 40px rgba(212,149,26,0.6); }
  }
  .play-hint {
    font-size: 0.75rem;
    color: #555;
    margin-top: 10px;
  }

  /* Presets */
  .presets {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 28px;
    max-width: 700px;
  }
  .preset-btn {
    background: #141414;
    border: 1px solid #2a2a2a;
    color: #999;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.78rem;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  .preset-btn:hover { border-color: #D4951A; color: #D4951A; }
  .preset-btn.active { border-color: #D4951A; color: #D4951A; background: rgba(212,149,26,0.1); }

  /* Sliders */
  .controls {
    width: 100%;
    max-width: 700px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 30px;
  }
  @media (max-width: 500px) { .controls { grid-template-columns: 1fr; } }

  .param {
    background: #111;
    border-radius: 10px;
    padding: 16px 18px;
    border: 1px solid #1a1a1a;
  }
  .param-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .param-name {
    font-size: 0.8rem;
    color: #D4951A;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .param-value {
    font-size: 0.8rem;
    color: #888;
    font-variant-numeric: tabular-nums;
  }
  .param-desc {
    font-size: 0.7rem;
    color: #555;
    margin-bottom: 10px;
    line-height: 1.4;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: #2a2a2a;
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #D4951A;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(212,149,26,0.3);
  }

  /* Harmonic display */
  .harmonics-wrap {
    width: 100%;
    max-width: 700px;
    background: #111;
    border-radius: 10px;
    padding: 18px;
    border: 1px solid #1a1a1a;
    margin-bottom: 24px;
  }
  .harmonics-title {
    font-size: 0.7rem;
    color: #D4951A;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .harmonics-bars {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 80px;
  }
  .h-bar {
    flex: 1;
    background: linear-gradient(to top, #D4951A, #8B6914);
    border-radius: 3px 3px 0 0;
    min-width: 20px;
    transition: height 0.3s ease;
    position: relative;
  }
  .h-bar-label {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.6rem;
    color: #555;
    white-space: nowrap;
  }

  .footer {
    font-size: 0.7rem;
    color: #333;
    margin-top: 20px;
  }
</style>
</head>
<body>

<h1>🔬 Sound Physics Playground</h1>
<p class="subtitle">Sculpt sound by shaping physical properties</p>

<div class="viz-wrap">
  <span class="viz-label">Waveform</span>
  <canvas id="viz"></canvas>
</div>

<div class="play-zone">
  <button id="playBtn" onclick="togglePlay()">▶</button>
  <div class="play-hint">Tap to strike · Adjust parameters to reshape</div>
</div>

<div class="presets" id="presets"></div>

<div class="harmonics-wrap">
  <div class="harmonics-title">Harmonic Spectrum</div>
  <div class="harmonics-bars" id="harmonicBars"></div>
</div>

<div class="controls" id="controls"></div>

<div class="footer">Earth Harmony Sound Lab · Physics → Sound → Healing</div>

<script>
// ============================================
// PARAMETERS
// ============================================
const params = {
  fundamental: { value: 120, min: 30, max: 800, step: 1, name: 'Fundamental', unit: 'Hz', desc: 'Base frequency — the root pitch of the resonating body' },
  material: { value: 0.5, min: 0, max: 1, step: 0.01, name: 'Material', unit: '', desc: 'Metal → Crystal → Wood. Shifts harmonic ratios from inharmonic to harmonic' },
  damping: { value: 8, min: 0.5, max: 25, step: 0.5, name: 'Damping', unit: 's', desc: 'How long sound sustains — the "death of the note"' },
  chaos: { value: 0.04, min: 0, max: 0.2, step: 0.005, name: 'Chaos', unit: '', desc: 'Frequency instability — shimmer, wobble, the life in the sound' },
  density: { value: 6, min: 2, max: 12, step: 1, name: 'Density', unit: '', desc: 'Number of overtones — sparse vs rich harmonic content' },
  inharmonicity: { value: 0.3, min: 0, max: 1, step: 0.01, name: 'Inharmonicity', unit: '', desc: 'How "off" the overtones are from perfect ratios. Bells and gongs are highly inharmonic' },
  brightness: { value: 0.5, min: 0, max: 1, step: 0.01, name: 'Brightness', unit: '', desc: 'Energy in upper partials — dull and warm vs bright and present' },
  attack: { value: 0.02, min: 0.001, max: 0.5, step: 0.001, name: 'Attack', unit: 's', desc: 'Strike hardness — sharp metallic hit vs soft mallet' },
  subBass: { value: 0.3, min: 0, max: 1, step: 0.01, name: 'Sub Bass', unit: '', desc: 'Low-end rumble — the vibration you feel in your chest' },
  beatFreq: { value: 0, min: 0, max: 8, step: 0.1, name: 'Beat Frequency', unit: 'Hz', desc: 'Interference pattern between close frequencies — binaural-like pulsing' }
};

// ============================================
// PRESETS
// ============================================
let currentEngine = null;

const presets = {
  'Tibetan Bowl':    { engine: 'bowl',    fundamental: 256, material: 0.3, damping: 10, chaos: 0.02, density: 5, inharmonicity: 0.4, brightness: 0.5, attack: 0.02, subBass: 0.2, beatFreq: 1.5 },
  'Crystal Bowl':    { engine: 'crystal', fundamental: 432, material: 0.8, damping: 14, chaos: 0.005, density: 3, inharmonicity: 0.05, brightness: 0.3, attack: 0.01, subBass: 0.1, beatFreq: 0.5 },
  'Deep Gong':       { engine: 'gong',    fundamental: 80, material: 0.2, damping: 18, chaos: 0.08, density: 10, inharmonicity: 0.7, brightness: 0.6, attack: 0.05, subBass: 0.8, beatFreq: 0 },
  'Handpan':         { engine: 'handpan', fundamental: 294, material: 0.35, damping: 5, chaos: 0.01, density: 5, inharmonicity: 0.15, brightness: 0.4, attack: 0.015, subBass: 0.15, beatFreq: 0 },
  'Native Flute':    { engine: 'flute',   fundamental: 392, material: 0.7, damping: 3, chaos: 0.04, density: 4, inharmonicity: 0.1, brightness: 0.5, attack: 0.03, subBass: 0, beatFreq: 0 },
  'Wind Chimes':     { engine: 'chimes',  fundamental: 800, material: 0.5, damping: 4, chaos: 0.01, density: 6, inharmonicity: 0.5, brightness: 0.9, attack: 0.005, subBass: 0, beatFreq: 0 },
  'Frame Drum':      { engine: 'drum',    fundamental: 80, material: 0.1, damping: 1.5, chaos: 0, density: 3, inharmonicity: 0.2, brightness: 0.3, attack: 0.005, subBass: 0.5, beatFreq: 0 },
  'Ocean Drum':      { engine: 'ocean',   fundamental: 55, material: 0.15, damping: 20, chaos: 0.15, density: 4, inharmonicity: 0.6, brightness: 0.5, attack: 0.5, subBass: 0.9, beatFreq: 0 },
  'Flumie Overtones':{ engine: 'gong',    fundamental: 100, material: 0.25, damping: 20, chaos: 0.1, density: 10, inharmonicity: 0.6, brightness: 0.55, attack: 0.08, subBass: 0.6, beatFreq: 1.2 }
};

// ============================================
// AUDIO ENGINE
// ============================================
let audioCtx = null;
let analyser = null;
let masterGain = null;
let isPlaying = false;
let currentNodes = [];

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.25;
  masterGain.connect(analyser);
  analyser.connect(audioCtx.destination);
}

function generateHarmonicRatios(count, inharmonicity) {
  const ratios = [];
  for (let i = 1; i <= count; i++) {
    // Perfect harmonic = i, fully inharmonic = i * (1 + random spread)
    const spread = inharmonicity * (Math.pow(i, 1.2) - i) * 0.5;
    const jitter = inharmonicity * (Math.random() - 0.5) * 0.3 * i;
    ratios.push(i + spread + jitter);
  }
  return ratios;
}

function getHarmonicAmps(count, brightness, material) {
  const amps = [];
  for (let i = 0; i < count; i++) {
    // Base rolloff
    let amp = 1 / Math.pow(i + 1, 1.5 - brightness);
    // Material affects odd/even balance
    if (i % 2 === 1) amp *= (0.5 + material * 0.5);
    amps.push(Math.min(amp, 1));
  }
  return amps;
}

// Dedicated synthesis engines — same as Explorer
const engines = {
  bowl(p, env, now) {
    const harmonics = [1, 2.71, 4.95, 7.57];
    const amps = [1, 0.6, 0.3, 0.15];
    harmonics.forEach((h, i) => {
      const osc = audioCtx.createOscillator();
      const hGain = audioCtx.createGain();
      osc.frequency.value = p.fundamental * h;
      const lfo = audioCtx.createOscillator();
      const lfoGain = audioCtx.createGain();
      lfo.frequency.value = 0.5 + Math.random() * 2;
      lfoGain.gain.value = p.fundamental * h * p.chaos;
      lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
      lfo.start(now); lfo.stop(now + p.damping + 1);
      hGain.gain.value = amps[i] * p.brightness;
      osc.connect(hGain); hGain.connect(env);
      osc.start(now); osc.stop(now + p.damping + 1);
      currentNodes.push(osc, lfo);
    });
    if (p.beatFreq > 0) {
      const osc2 = audioCtx.createOscillator();
      osc2.frequency.value = p.fundamental + p.beatFreq;
      const g = audioCtx.createGain(); g.gain.value = 0.5;
      osc2.connect(g); g.connect(env);
      osc2.start(now); osc2.stop(now + p.damping + 1);
      currentNodes.push(osc2);
    }
    return harmonics.map((h,i) => ({ ratio: h, amp: amps[i] }));
  },

  crystal(p, env, now) {
    const harmonics = [1, 2, 3];
    const amps = [1, 0.08, 0.03];
    harmonics.forEach((h, i) => {
      const osc = audioCtx.createOscillator();
      osc.frequency.value = p.fundamental * h;
      const lfo = audioCtx.createOscillator();
      const lfoGain = audioCtx.createGain();
      lfo.frequency.value = 0.3 + Math.random();
      lfoGain.gain.value = p.fundamental * h * 0.005;
      lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
      lfo.start(now); lfo.stop(now + p.damping + 1);
      const hGain = audioCtx.createGain();
      hGain.gain.value = amps[i];
      osc.connect(hGain); hGain.connect(env);
      osc.start(now); osc.stop(now + p.damping + 1);
      currentNodes.push(osc, lfo);
    });
    return harmonics.map((h,i) => ({ ratio: h, amp: amps[i] }));
  },

  gong(p, env, now) {
    const harmonics = [1, 1.35, 1.72, 2.18, 2.85, 3.5, 4.8, 6.1];
    const amps = [1, 0.8, 0.6, 0.5, 0.35, 0.25, 0.15, 0.1];
    harmonics.forEach((h, i) => {
      const osc = audioCtx.createOscillator();
      const hGain = audioCtx.createGain();
      osc.frequency.value = p.fundamental * h;
      const lfo = audioCtx.createOscillator();
      const lfoGain = audioCtx.createGain();
      lfo.frequency.value = 0.1 + Math.random() * 3;
      lfoGain.gain.value = p.fundamental * h * p.chaos * (1 + Math.random());
      lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
      lfo.start(now); lfo.stop(now + p.damping + 1);
      hGain.gain.value = amps[i];
      osc.connect(hGain); hGain.connect(env);
      osc.start(now); osc.stop(now + p.damping + 1);
      currentNodes.push(osc, lfo);
    });
    // Sub-bass rumble
    const sub = audioCtx.createOscillator();
    sub.frequency.value = p.fundamental / 2; sub.type = 'triangle';
    const sG = audioCtx.createGain(); sG.gain.value = p.subBass * 0.6;
    sub.connect(sG); sG.connect(env);
    sub.start(now); sub.stop(now + p.damping + 1);
    currentNodes.push(sub);
    return harmonics.map((h,i) => ({ ratio: h, amp: amps[i] }));
  },

  handpan(p, env, now) {
    const harmonics = [1, 2, 3, 4.01];
    const amps = [1, 0.4, 0.2, 0.08];
    harmonics.forEach((h, i) => {
      const osc = audioCtx.createOscillator();
      osc.frequency.value = p.fundamental * h;
      const lfo = audioCtx.createOscillator();
      const lfoGain = audioCtx.createGain();
      lfo.frequency.value = 0.5 + Math.random() * 2;
      lfoGain.gain.value = p.fundamental * h * 0.01;
      lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
      lfo.start(now); lfo.stop(now + p.damping + 1);
      const hGain = audioCtx.createGain();
      hGain.gain.value = amps[i];
      osc.connect(hGain); hGain.connect(env);
      osc.start(now); osc.stop(now + p.damping + 1);
      currentNodes.push(osc, lfo);
    });
    return harmonics.map((h,i) => ({ ratio: h, amp: amps[i] }));
  },

  flute(p, env, now) {
    const osc = audioCtx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = p.fundamental;
    const vib = audioCtx.createOscillator();
    const vibG = audioCtx.createGain();
    vib.frequency.value = 5; vibG.gain.value = 4;
    vib.connect(vibG); vibG.connect(osc.frequency);
    vib.start(now); vib.stop(now + p.damping + 1);
    // Breath noise
    const bufSize = audioCtx.sampleRate * 2;
    const nBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const nd = nBuf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) nd[i] = Math.random() * 2 - 1;
    const nSrc = audioCtx.createBufferSource(); nSrc.buffer = nBuf;
    const nFilt = audioCtx.createBiquadFilter();
    nFilt.type = 'bandpass'; nFilt.frequency.value = p.fundamental; nFilt.Q.value = 2;
    const nG = audioCtx.createGain(); nG.gain.value = 0.15;
    nSrc.connect(nFilt); nFilt.connect(nG); nG.connect(env);
    nSrc.start(now); nSrc.stop(now + p.damping + 1);
    osc.connect(env);
    osc.start(now); osc.stop(now + p.damping + 1);
    currentNodes.push(osc, vib, nSrc);
    return [1,2,3].map((h,i) => ({ ratio: h, amp: [1,0.3,0.15][i] }));
  },

  chimes(p, env, now) {
    const freqs = [800, 1000, 1200, 1350, 1600, 1900];
    for (let i = 0; i < 10; i++) {
      const delay = Math.random() * 2;
      const freq = freqs[Math.floor(Math.random() * freqs.length)];
      const osc = audioCtx.createOscillator();
      const cEnv = audioCtx.createGain();
      osc.frequency.value = freq * (0.98 + Math.random() * 0.04);
      cEnv.gain.setValueAtTime(0, now + delay);
      cEnv.gain.linearRampToValueAtTime(0.3 + Math.random() * 0.4, now + delay + 0.01);
      cEnv.gain.exponentialRampToValueAtTime(0.001, now + delay + 4);
      osc.connect(cEnv); cEnv.connect(masterGain);
      osc.start(now + delay); osc.stop(now + delay + 5);
      currentNodes.push(osc);
    }
    return freqs.slice(0,6).map((f,i) => ({ ratio: f/freqs[0], amp: 0.7 - i*0.1 }));
  },

  drum(p, env, now) {
    const osc = audioCtx.createOscillator();
    osc.frequency.setValueAtTime(p.fundamental * 2, now);
    osc.frequency.exponentialRampToValueAtTime(p.fundamental, now + 0.1);
    const dEnv = audioCtx.createGain();
    dEnv.gain.setValueAtTime(1, now);
    dEnv.gain.exponentialRampToValueAtTime(0.001, now + p.damping);
    osc.connect(dEnv); dEnv.connect(masterGain);
    osc.start(now); osc.stop(now + p.damping + 0.5);
    // Noise transient
    const bufSize = audioCtx.sampleRate * 0.3;
    const nBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const nd = nBuf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) nd[i] = Math.random() * 2 - 1;
    const nSrc = audioCtx.createBufferSource(); nSrc.buffer = nBuf;
    const nEnv = audioCtx.createGain();
    nEnv.gain.setValueAtTime(0.8, now);
    nEnv.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    const nF = audioCtx.createBiquadFilter(); nF.type = 'lowpass'; nF.frequency.value = 400;
    nSrc.connect(nF); nF.connect(nEnv); nEnv.connect(masterGain);
    nSrc.start(now); nSrc.stop(now + 0.3);
    currentNodes.push(osc, nSrc);
    return [1,2,3].map((h,i) => ({ ratio: h, amp: [1,0.3,0.1][i] }));
  },

  ocean(p, env, now) {
    // Low drone
    const harmonics = [1, 1.5, 2.1, 3.2];
    const amps = [1, 0.5, 0.3, 0.15];
    harmonics.forEach((h, i) => {
      const osc = audioCtx.createOscillator();
      osc.frequency.value = p.fundamental * h;
      osc.type = 'sine';
      const lfo = audioCtx.createOscillator();
      const lfoG = audioCtx.createGain();
      lfo.frequency.value = 0.05 + Math.random() * 0.3;
      lfoG.gain.value = p.fundamental * h * 0.15;
      lfo.connect(lfoG); lfoG.connect(osc.frequency);
      lfo.start(now); lfo.stop(now + p.damping + 1);
      const hG = audioCtx.createGain(); hG.gain.value = amps[i];
      osc.connect(hG); hG.connect(env);
      osc.start(now); osc.stop(now + p.damping + 1);
      currentNodes.push(osc, lfo);
    });
    // Bead noise
    const bufSize = audioCtx.sampleRate * Math.min(p.damping, 20);
    const nBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = nBuf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      const t = i / audioCtx.sampleRate;
      const swell = Math.sin(t * Math.PI * 0.25) * 0.5 + 0.5;
      const micro = Math.sin(t * Math.PI * 2) * 0.2 + 0.8;
      const bead = (Math.random() * 2 - 1) * swell * micro;
      const impact = Math.random() < 0.003 ? (Math.random() * 2 - 1) * 2 : 0;
      data[i] = bead * 0.35 + impact * 0.15;
    }
    const nSrc = audioCtx.createBufferSource(); nSrc.buffer = nBuf;
    const bpf = audioCtx.createBiquadFilter();
    bpf.type = 'bandpass'; bpf.frequency.value = p.fundamental * 3; bpf.Q.value = 0.6;
    const nG = audioCtx.createGain(); nG.gain.value = 0.7;
    nSrc.connect(bpf); bpf.connect(nG); nG.connect(env);
    nSrc.start(now); nSrc.stop(now + p.damping + 1);
    currentNodes.push(nSrc);
    // Sub
    const sub = audioCtx.createOscillator();
    sub.frequency.value = p.fundamental / 2; sub.type = 'sine';
    const sG = audioCtx.createGain(); sG.gain.value = 0.5;
    sub.connect(sG); sG.connect(env);
    sub.start(now); sub.stop(now + p.damping + 1);
    currentNodes.push(sub);
    return harmonics.map((h,i) => ({ ratio: h, amp: amps[i] }));
  }
};

function strike() {
  initAudio();
  currentNodes.forEach(n => { try { n.stop(); } catch(e){} });
  currentNodes = [];

  const p = {};
  Object.keys(params).forEach(k => p[k] = params[k].value);
  const now = audioCtx.currentTime;

  // Master envelope
  const env = audioCtx.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(0.8, now + p.attack);
  env.gain.exponentialRampToValueAtTime(0.001, now + p.damping);
  env.connect(masterGain);

  // Use dedicated engine if preset selected, otherwise generic
  let harmonicData = null;
  if (currentEngine && engines[currentEngine]) {
    harmonicData = engines[currentEngine](p, env, now);
  } else {
    // Generic fallback
    const harmonicRatios = generateHarmonicRatios(p.density, p.inharmonicity);
    const harmonicAmps = getHarmonicAmps(p.density, p.brightness, p.material);
    harmonicRatios.forEach((ratio, i) => {
      const freq = p.fundamental * ratio;
      if (freq > 20000) return;
      const osc = audioCtx.createOscillator();
      const hGain = audioCtx.createGain();
      osc.frequency.value = freq;
      hGain.gain.value = harmonicAmps[i] || 0.1;
      if (p.chaos > 0) {
        const lfo = audioCtx.createOscillator();
        const lfoGain = audioCtx.createGain();
        lfo.frequency.value = 0.2 + Math.random() * 3;
        lfoGain.gain.value = freq * p.chaos * (1 + Math.random());
        lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
        lfo.start(now); lfo.stop(now + p.damping + 1);
        currentNodes.push(lfo);
      }
      osc.connect(hGain); hGain.connect(env);
      osc.start(now); osc.stop(now + p.damping + 1);
      currentNodes.push(osc);
    });
    harmonicData = harmonicRatios.map((r,i) => ({ ratio: r, amp: harmonicAmps[i] }));
  }

  // Update harmonic display
  if (harmonicData) {
    updateHarmonicBars(
      harmonicData.map(h => h.ratio),
      harmonicData.map(h => h.amp)
    );

  isPlaying = true;
  document.getElementById('playBtn').classList.add('playing');
  document.getElementById('playBtn').textContent = '◉';
  setTimeout(() => {
    isPlaying = false;
    document.getElementById('playBtn').classList.remove('playing');
    document.getElementById('playBtn').textContent = '▶';
  }, p.damping * 1000);
}

function togglePlay() {
  strike();
}

// ============================================
// UI
// ============================================
function buildControls() {
  const container = document.getElementById('controls');
  Object.keys(params).forEach(key => {
    const p = params[key];
    const div = document.createElement('div');
    div.className = 'param';
    div.innerHTML = `
      <div class="param-header">
        <span class="param-name">${p.name}</span>
        <span class="param-value" id="val-${key}">${formatVal(p.value, p.unit)}</span>
      </div>
      <div class="param-desc">${p.desc}</div>
      <input type="range" id="slider-${key}" min="${p.min}" max="${p.max}" step="${p.step}" value="${p.value}">
    `;
    container.appendChild(div);

    div.querySelector('input').addEventListener('input', (e) => {
      params[key].value = parseFloat(e.target.value);
      document.getElementById(`val-${key}`).textContent = formatVal(params[key].value, p.unit);
    });
  });
}

function formatVal(v, unit) {
  if (unit === 'Hz') return Math.round(v) + ' Hz';
  if (unit === 's') return v.toFixed(1) + 's';
  return v.toFixed(v < 1 ? 3 : 1);
}

function buildPresets() {
  const container = document.getElementById('presets');
  Object.keys(presets).forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = name;
    btn.addEventListener('click', () => {
      const preset = presets[name];
      currentEngine = preset.engine || null;
      Object.keys(preset).forEach(key => {
        if (key === 'engine') return;
        params[key].value = preset[key];
        const slider = document.getElementById(`slider-${key}`);
        if (slider) {
          slider.value = preset[key];
          document.getElementById(`val-${key}`).textContent = formatVal(preset[key], params[key].unit);
        }
      });
      // Highlight
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // Auto-play
      strike();
    });
    container.appendChild(btn);
  });
}

function updateHarmonicBars(ratios, amps) {
  const container = document.getElementById('harmonicBars');
  container.innerHTML = '';
  const maxAmp = Math.max(...amps);
  ratios.forEach((ratio, i) => {
    const bar = document.createElement('div');
    bar.className = 'h-bar';
    const height = (amps[i] / maxAmp) * 70;
    bar.style.height = height + 'px';
    bar.style.opacity = 0.4 + (amps[i] / maxAmp) * 0.6;
    bar.innerHTML = `<span class="h-bar-label">${ratio.toFixed(1)}x</span>`;
    container.appendChild(bar);
  });
}

// ============================================
// VISUALIZER
// ============================================
function initViz() {
  const canvas = document.getElementById('viz');
  const ctx = canvas.getContext('2d');
  function resize() {
    canvas.width = canvas.offsetWidth * 2;
    canvas.height = canvas.offsetHeight * 2;
    ctx.scale(2, 2);
  }
  resize();
  window.addEventListener('resize', resize);

  const bufLen = 1024;
  const dataArray = new Uint8Array(bufLen);

  function draw() {
    requestAnimationFrame(draw);
    const w = canvas.offsetWidth;
    const h = canvas.offsetHeight;
    ctx.clearRect(0, 0, w, h);

    if (!analyser) {
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(212,149,26,0.1)';
      ctx.lineWidth = 1;
      const t = Date.now() / 3000;
      for (let x = 0; x < w; x++) {
        const y = h/2 + Math.sin(x/100 + t) * 10;
        x === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.stroke();
      return;
    }

    analyser.getByteTimeDomainData(dataArray);
    ctx.beginPath();
    const grad = ctx.createLinearGradient(0,0,w,0);
    grad.addColorStop(0, 'rgba(212,149,26,0.7)');
    grad.addColorStop(0.5, 'rgba(155,89,182,0.5)');
    grad.addColorStop(1, 'rgba(46,204,113,0.5)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.shadowBlur = 12;
    ctx.shadowColor = 'rgba(212,149,26,0.3)';

    const sliceW = w / bufLen;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const v = dataArray[i] / 128.0;
      const y = v * h / 2;
      i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      x += sliceW;
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
  draw();
}

// Init
buildControls();
buildPresets();
updateHarmonicBars([1,2,3,4,5,6], [1,0.6,0.4,0.25,0.15,0.1]);
initViz();
</script>
